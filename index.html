<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ecommerce Website</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">MyShore</div>

    <input type="text" placeholder="Search..." class="search-bar">

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
    </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">
    <img src="images/heroSection.png" alt="Hero Image">
    
    <div class="hero-content">
<h1>Welcome to
Our Store</h1>
        <button>Shop Now</button>
    </div>
</section>


<section class="categories">

    <div class="category-card">
        <img src="images/shoe1.png" alt="shoes">
        <h3>shoes</h3>
    </div>

    <div class="category-card">
        <img src="images/fashionwatches.png" alt="watches">
        <h3>watches</h3>
    </div>

    <div class="category-card">
        <img src="images/clothes.png" alt="clothes">
        <h3>clothes</h3>
    </div>

</section>


<section class="featured-products">

    <h2>Featured Products</h2>

    <div class="products">

        <div class="product-card">
            <img src="images/shoe1.png" alt="Product 1">
            <h3>Running Shoes</h3>
            <p>PKR 4,000</p>
            <button>Buy Now</button>
        </div>

        <div class="product-card">
            <img src="images/watch.png" alt="Product 2">
            <h3>Smart Watch</h3>
            <p>PKR 2,500</p>
            <button>Buy Now</button>
        </div>

        <div class="product-card">
            <img src="images/headphone.png" alt="Product 3">
            <h3>Headphones</h3>
            <p>PKR 2,500</p>
            <button>Buy Now</button>
        </div>

    </div>

    <div class="load-more">
    <button id="loadMoreBtn">Load More</button>
</div>

<div class="product-card hidden">
    <img src="images/shoe2.png" alt="Product 4">
    <h3>Casual Shoes</h3>
    <p>PKR 5,000</p>
    <button>Buy Now</button>
</div>


<div class="product-card hidden">
    <img src="images/shalwarkameez.png" alt="Product 5">
    <h3>Shalwar kameez</h3>
    <p>PKR 4,500</p>
    <button>Buy Now</button>
</div>


<div class="product-card hidden">
    <img src="images/headphone.png" alt="Product 6">
    <h3>Headphones</h3>
    <p>PKR 2,500</p>
    <button>Buy Now</button>
</div>

</section>


<!-- FOOTER -->
<footer>
    <p>© 2026 MyStore | All Rights Reserved</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
