<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">MyStore</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
    </nav>
</header>

<section class="product-detail">

    <div class="product-image">
        <img src="images/shoe2.png" alt="Running Shoes">
    </div>



<div class="product-info">
        <h2>Running Shoes</h2>
        <p class="price">PKR 5,000</p>

        <p class="desc">
        High quality running shoes. Comfortable and stylish for daily use.
        </p>

        <select>
            <option>Select Size</option>
            <option>Size 7</option>
            <option>Size 8</option>
            <option>Size 9</option>
        </select>

        <button>Add to Cart</button>
    </div>

</section>

<div class="related-products">
    <h3>Related Products</h3>

    <div class="products">
        
        <div class="product-card">
            <img src="images/shoe2.png" alt="Casual Shoes">
            <h4>Casual Shoes</h4>
        </div>

        <div class="product-card">
            <img src="images/watch.png" alt="Wrist Watch">
            <h4>Watch</h4>
        </div>

        <div class="product-card">
            <img src="images/shirt.png" alt="Shirt">
            <h4>Shirt</h4>
        </div>

    </div>
</div>

<div class="reviews">
    <h3>Customer Reviews</h3>

    <p>⭐️⭐️⭐️⭐️ Great quality product!</p>
    <p>⭐️⭐️⭐️⭐️⭐️ Very comfortable and stylish!</p>
    <p>⭐️⭐️⭐️⭐️ Worth the price!</p>
</div>

</body>
</html>
