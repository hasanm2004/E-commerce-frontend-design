<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">MyStore</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
    </nav>
</header>

<section class="product-detail">

    <div class="product-image">
        <img src="images/jeanspaint.png" alt="Jeans">
    </div>



<div class="product-info">
        <h2>Jeans</h2>
        <p class="price">PKR 1,000</p>

        <p class="desc">
            High quality jeans. Stylish and comfortable for daily wear.
        </p>

        <select>
            <option>Select Size</option>
            <option>Small</option>
            <option>Medium</option>
            <option>Large</option>
        </select>


        <select>
            <option>Select Color</option>
            <option>Red</option>
            <option>Blue</option>
            <option>Black</option>
        </select> 
        <button>Add to Cart</button>
    </div>

</section>

<div class="related-products">
    <h3>Related Products</h3>

    <div class="products">
        
        <div class="product-card">
            <img src="images/shoe2.png" alt="Casual Shoes">
            <h4>Casual Shoes</h4>
        </div>

        <div class="product-card">
            <img src="images/watch.png" alt="Wrist Watch">
            <h4>Watch</h4>
        </div>

        <div class="product-card">
            <img src="images/shirt.png" alt="Casual Shirt">
            <h4>Shirt</h4>
        </div>

    </div>
</div>

<div class="reviews">
    <h3>Customer Reviews</h3>

    <p>⭐️⭐️⭐️⭐️ Great quality product!</p>
    <p>⭐️⭐️⭐️⭐️⭐️ Very comfortable and stylish!</p>
    <p>⭐️⭐️⭐️⭐️ Worth the price!</p>
</div>

</body>
</html>
